<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 100%; height: 100%;
      background: #000;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }
    img {
      width: 200px;
      height: 200px;
      object-fit: contain;
      animation: spin 4s linear infinite;
    }
    @keyframes spin {
      from { transform: rotate(0deg); }
      to   { transform: rotate(360deg); }
    }
  </style>
</head>
<body>
  <img id="img" src="image.png">
  <audio id="audio" loop></audio>

  <script>
    fetch("https://ipapi.co/json/")
      .then(r => r.json())
      .then(data => {
        const audio = document.getElementById("audio");
        const img = document.getElementById("img");
        if (data.country_code === "RU") {
          audio.src = "music2.mp3";
          img.src = "image2.png";
        } else {
          audio.src = "music.mp3";
          img.src = "image.png";
        }
        audio.play();
      })
      .catch(() => {
        const audio = document.getElementById("audio");
        audio.src = "music.mp3";
        audio.play();
      });
  </script>
</body>
</html>
